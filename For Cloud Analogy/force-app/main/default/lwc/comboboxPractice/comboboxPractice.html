<template>
    <lightning-combobox name="Account" label="Accountt" value={zz} placeholder="Select Account" options={options}
        onchange={handleChange}  ></lightning-combobox>
    <p>Selected value is: {zz}</p>
    <template if:true={show}>
        <lightning-card icon-name="standard:account" variant="base">
            <div slot="title">
                Contact
            </div>
            <div>
                <lightning-datatable
                  key-field="Id"
                  data={condata}
                  columns={column}
                ></lightning-datatable>
            </div>
        </lightning-card>
    </template>

</template>
